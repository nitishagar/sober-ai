name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:/tmp/soberai-test.db
      OLLAMA_ENDPOINT: http://localhost:11435
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=src/db/schema.prisma
      - name: Run tests (unit + integration)
        run: npm run test:ci
      - name: Lint
        run: npm run lint
      - name: Build frontend
        run: cd frontend && npm ci && npm run build
