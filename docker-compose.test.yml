version: '3.8'

# docker-compose.test.yml
# Local integration-test orchestration. The app uses a SQLite database
# (src/db/schema.prisma provider="sqlite"), so there is no DB infrastructure to
# stand up — the backend mounts a file: DATABASE_URL and runs prisma migrate
# deploy itself, mirroring docker-compose.local.yml's working shape.

services:
  # Ollama LLM service
  ollama:
    image: ollama/ollama:latest
    container_name: sober-ollama-test
    platform: linux/arm64
    ports:
      - "11434:11434"
    volumes:
      - ollama-test-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        limits:
          memory: 4G  # qwen3:4b requires ~2.5GB

  # Backend API
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: sober-backend-test
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - sqlite-test-data:/app/data
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=file:/app/data/soberai.db
      - OLLAMA_ENDPOINT=http://ollama:11434
    depends_on:
      ollama:
        condition: service_started
    command: >
      sh -c "
        npx prisma migrate deploy --schema=src/db/schema.prisma &&
        node src/db/seed.js &&
        npm run dev
      "

  # Frontend (React + Vite)
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: sober-frontend-test
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - VITE_API_URL=http://backend:3000
    depends_on:
      - backend

volumes:
  ollama-test-data:
  sqlite-test-data:
