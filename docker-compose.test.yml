version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: sober-postgres-test
    environment:
      POSTGRES_DB: soberai_test
      POSTGRES_USER: soberai
      POSTGRES_PASSWORD: test_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soberai"]
      interval: 5s
      timeout: 3s
      retries: 3

  # Redis for future queue system
  redis:
    image: redis:7-alpine
    container_name: sober-redis-test
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  # Ollama LLM service
  ollama:
    image: ollama/ollama:latest
    container_name: sober-ollama-test
    platform: linux/arm64
    ports:
      - "11434:11434"
    volumes:
      - ollama-test-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        limits:
          memory: 4G  # qwen3:4b requires ~2.5GB

  # Backend API
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: sober-backend-test
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://soberai:test_password@postgres:5432/soberai_test
      - OLLAMA_ENDPOINT=http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    command: >
      sh -c "
        npx prisma migrate deploy --schema=src/db/schema.prisma &&
        node src/db/seed.js &&
        npm run dev
      "

  # Frontend (React + Vite)
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: sober-frontend-test
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:3000
    depends_on:
      - backend

volumes:
  ollama-test-data:
