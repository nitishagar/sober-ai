version: "1.0"

# Enabled audits
enabled:
  - ssr-readiness
  - schema-coverage
  - semantic-structure
  - content-extractability
  - machine-readability

# Weights (must sum to 100) - Phase 2: 5 core audits
weights:
  ssr_readiness: 20          # CRITICAL for AI agents
  schema_coverage: 20        # Schema.org structured data
  semantic_structure: 20     # HTML5 semantic elements
  content_extractability: 20 # LLM-optimized content
  machine_readability: 20    # AI crawler discoverability

# Scoring thresholds
thresholds:
  excellent: 90
  good: 75
  needs_improvement: 50
  critical: 25

# Industry detection
industries:
  templates:
    - ecommerce
    - saas
    - documentation
    - news
    - local-business
    - general

  auto_detect: true
  fallback: "general"

# Output configuration
output:
  formats:
    - json
    - html
  include_raw_data: false
  include_llm_reasoning: true
  include_code_examples: true
  include_impact_scores: true
