version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: sober-postgres-local
    environment:
      POSTGRES_DB: soberai_dev
      POSTGRES_USER: soberai
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soberai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for queue system
  redis:
    image: redis:7-alpine
    container_name: sober-redis-local
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama LLM service with auto-model download
  ollama:
    build:
      context: .
      dockerfile: docker/Dockerfile.ollama
    container_name: sober-ollama-local
    platform: linux/arm64
    ports:
      - "11434:11434"
    volumes:
      - ollama-local-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        limits:
          memory: 6G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  # Backend API
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: sober-backend-local
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./backend:/app/backend
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://soberai:dev_password@postgres:5432/soberai_dev
      - REDIS_URL=redis://redis:6379
      - OLLAMA_ENDPOINT=http://ollama:11434
      - JWT_SECRET=dev_secret_key_change_in_production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    command: >
      sh -c "
        echo '[Backend] Waiting for dependencies...' &&
        npx prisma migrate deploy --schema=backend/src/db/schema.prisma &&
        echo '[Backend] Migrations applied' &&
        node backend/src/db/seed.js &&
        echo '[Backend] Database seeded' &&
        npm run dev
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Frontend (React + Vite with HMR)
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: sober-frontend-local
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - VITE_API_URL=http://backend:3000
    depends_on:
      backend:
        condition: service_healthy
    command: npm run dev -- --host 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres-local-data:
  ollama-local-data:
