version: '3.8'

services:
  ollama:
    build:
      context: .
      dockerfile: docker/Dockerfile.ollama
    container_name: sober-ollama-local
    ports:
      - "11434:11434"
    volumes:
      - ollama-local-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        limits:
          memory: 6G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: sober-backend-local
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - sqlite-local-data:/app/data
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=file:/app/data/soberai.db
      - OLLAMA_ENDPOINT=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    command: >
      sh -c "
        echo '[Backend] Running migrations...' &&
        npx prisma migrate deploy --schema=src/db/schema.prisma &&
        echo '[Backend] Migrations applied' &&
        npm run dev
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: sober-frontend-local
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - VITE_API_URL=http://backend:3000
    depends_on:
      backend:
        condition: service_healthy
    command: npm run dev -- --host 0.0.0.0

volumes:
  ollama-local-data:
  sqlite-local-data:
