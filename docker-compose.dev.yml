version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sober-postgres-dev
    environment:
      POSTGRES_DB: soberai_dev
      POSTGRES_USER: soberai
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soberai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sober-redis-dev
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Note: Ollama is already running from Phase 1 as sober-ollama
  # We'll use the existing container on port 11434

volumes:
  postgres-dev-data:
